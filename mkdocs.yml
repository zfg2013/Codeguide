site_name: Codeguide
site_description: A GitHub Pages curriculum of executable marimo WASM notebooks.
repo_name: zfg2013/Codeguide
repo_url: https://github.com/zfg2013/Codeguide
docs_dir: docs
site_dir: site
strict: true

validation:
  links:
    not_found: ignore

theme:
  name: material
  language: en
  palette:
    scheme: default
    primary: indigo
    accent: cyan
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - tables

nav:
  - Home: index.md
  - Tutorials:
      - Overview: tutorials/index.md
      - Statistical Theory: tutorials/statistical-theory.md
      - Sequencing: tutorials/sequencing.md
      - Machine Learning: tutorials/machine-learning.md
      - Molecular Design Engineering: tutorials/molecular-design-engineering.md
  - Notebook Library: notebooks/index.md
