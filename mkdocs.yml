site_name: Codeguide
site_description: A GitHub Pages tutorial site for practical coding guides and executable notebooks.
repo_name: zfg2013/Codeguide
repo_url: https://github.com/zfg2013/Codeguide
docs_dir: docs
site_dir: site
strict: true

theme:
  name: material
  language: en
  palette:
    scheme: default
    primary: indigo
    accent: cyan
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - tables

nav:
  - Home: index.md
  - Tutorials:
      - Overview: tutorials/index.md
      - Example Python Workflow: tutorials/example-python-workflow.md
  - Notebooks: notebooks/index.md
